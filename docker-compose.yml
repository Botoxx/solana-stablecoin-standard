services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sss}
      POSTGRES_DB: ${POSTGRES_DB:-sss}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sss"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  indexer:
    build:
      context: ./services
      dockerfile: indexer/Dockerfile
    stop_grace_period: 30s
    ports:
      - "${PORT_INDEXER:-3001}:3001"
    environment:
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8899}
      PROGRAM_ID: ${PROGRAM_ID:-Fjv9YM4CUWFgQZQzLyD42JojLcDJ2yPG7WDEaR7U14n1}
      HOOK_PROGRAM_ID: ${HOOK_PROGRAM_ID:-7z98ECJDGgRTZgnkX4iY8F6yqLBkiFKXJR2p51jrvUaj}
      POSTGRES_URL: postgresql://sss:sss@postgres:5432/sss
      WEBHOOK_URL: http://webhook:3004
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  mint-burn:
    build:
      context: ./services
      dockerfile: mint-burn/Dockerfile
    stop_grace_period: 30s
    ports:
      - "${PORT_MINT_BURN:-3002}:3002"
    environment:
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8899}
      PROGRAM_ID: ${PROGRAM_ID:-Fjv9YM4CUWFgQZQzLyD42JojLcDJ2yPG7WDEaR7U14n1}
      POSTGRES_URL: postgresql://sss:sss@postgres:5432/sss
      REDIS_URL: redis://redis:6379
      AUTHORITY_KEYPAIR: ${AUTHORITY_KEYPAIR:-}
      PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  compliance:
    build:
      context: ./services
      dockerfile: compliance/Dockerfile
    ports:
      - "${PORT_COMPLIANCE:-3003}:3003"
    environment:
      POSTGRES_URL: postgresql://sss:sss@postgres:5432/sss
      PORT: "3003"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  webhook:
    build:
      context: ./services
      dockerfile: webhook/Dockerfile
    stop_grace_period: 30s
    ports:
      - "${PORT_WEBHOOK:-3004}:3004"
    environment:
      POSTGRES_URL: postgresql://sss:sss@postgres:5432/sss
      PORT: "3004"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
